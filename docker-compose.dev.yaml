services:
  service_frontend_dev:
    image: platform_frontend_dev:0.0.1
    container_name: container_platform_frontend_dev
    ports:
      - "5173:5173"
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild
        - path: ./frontend
          target: /app
          action: sync

  service_backend_dev:
    image: platform_backend_dev:0.0.1
    container_name: container_platform_backend_dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    develop:
      watch:
        - path: ./backend/go.mod
          action: rebuild
        - path: ./backend/go.sum
          action: rebuild
        - path: ./backend
          target: /app
          action: sync